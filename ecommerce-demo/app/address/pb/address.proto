syntax = "proto3";

package pb;

option go_package = "ecommerce-demo/app/address/pb";

service Address {
  rpc GetAddressList(GetAddressListReq) returns (GetAddressListResp);
  rpc AddAddress(AddAddressReq) returns (AddAddressResp);
  rpc UpdateAddress(UpdateAddressReq) returns (UpdateAddressResp);
  rpc DeleteAddress(DeleteAddressReq) returns (DeleteAddressResp);
  rpc SetDefaultAddress(SetDefaultAddressReq) returns (SetDefaultAddressResp);
}

message AddressItem {
  int64 id = 1;
  int64 user_id = 2;
  string receiver_name = 3;
  string phone = 4;
  string province = 5;
  string city = 6;
  string district = 7;
  string detail_address = 8;
  string postal_code = 9;
  bool is_default = 10;
}

message GetAddressListReq {
  int64 user_id = 1;
}

message GetAddressListResp {
  repeated AddressItem addresses = 1;
}

message AddAddressReq {
  int64 user_id = 1;
  string receiver_name = 2;
  string phone = 3;
  string province = 4;
  string city = 5;
  string district = 6;
  string detail_address = 7;
  string postal_code = 8;
  bool is_default = 9;
}

message AddAddressResp {
  int64 id = 1;
  bool success = 2;
  string message = 3;
}

message UpdateAddressReq {
  int64 id = 1;
  int64 user_id = 2;
  string receiver_name = 3;
  string phone = 4;
  string province = 5;
  string city = 6;
  string district = 7;
  string detail_address = 8;
  string postal_code = 9;
  bool is_default = 10;
}

message UpdateAddressResp {
  bool success = 1;
  string message = 2;
}

message DeleteAddressReq {
  int64 id = 1;
  int64 user_id = 2;
}

message DeleteAddressResp {
  bool success = 1;
  string message = 2;
}

message SetDefaultAddressReq {
  int64 id = 1;
  int64 user_id = 2;
}

message SetDefaultAddressResp {
  bool success = 1;
  string message = 2;
}
