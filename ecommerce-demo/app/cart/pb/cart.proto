syntax = "proto3";

package pb;

option go_package = "./pb";

message CartItem {
  int64 product_id = 1;
  string product_name = 2;
  int64 price = 3;
  string image_url = 4;
  int32 count = 5;
  bool selected = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message AddCartReq {
  int64 user_id = 1;
  int64 product_id = 2;
  string product_name = 3;
  int64 price = 4;
  string image_url = 5;
  int32 count = 6;
}

message AddCartResp {
  string message = 1;
  int32 total_count = 2;
}

message GetCartReq {
  int64 user_id = 1;
}

message GetCartResp {
  repeated CartItem items = 1;
  int32 total_count = 2;
  int64 total_amount = 3;
}

message UpdateCartReq {
  int64 user_id = 1;
  int64 product_id = 2;
  int32 count = 3;
}

message UpdateCartResp {
  string message = 1;
}

message RemoveCartReq {
  int64 user_id = 1;
  int64 product_id = 2;
}

message RemoveCartResp {
  string message = 1;
}

message ClearCartReq {
  int64 user_id = 1;
}

message ClearCartResp {
  string message = 1;
  int32 removed_count = 2;
}

message SelectCartReq {
  int64 user_id = 1;
  int64 product_id = 2;
  bool selected = 3;
}

message SelectCartResp {
  string message = 1;
}

message GetSelectedCartReq {
  int64 user_id = 1;
}

message GetSelectedCartResp {
  repeated CartItem items = 1;
  int32 selected_count = 2;
  int64 total_amount = 3;
}

service Cart {
  rpc AddCart(AddCartReq) returns (AddCartResp);
  rpc GetCart(GetCartReq) returns (GetCartResp);
  rpc UpdateCart(UpdateCartReq) returns (UpdateCartResp);
  rpc RemoveCart(RemoveCartReq) returns (RemoveCartResp);
  rpc ClearCart(ClearCartReq) returns (ClearCartResp);
  rpc SelectCart(SelectCartReq) returns (SelectCartResp);
  rpc GetSelectedCart(GetSelectedCartReq) returns (GetSelectedCartResp);
}
