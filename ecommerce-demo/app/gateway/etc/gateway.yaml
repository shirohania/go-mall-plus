Name: gateway
Host: 0.0.0.0
Port: 8888

Auth:
  PrivateKeyPath: "/app/cert/private.pem"
  PublicKeyPath: "/app/cert/public.pem"
  AccessExpire: 7200
  RefreshExpire: 604800

# 限流配置
RateLimit:
  Enabled: true
  Global:
    Rate: 1000
    Burst: 2000
  PerIP:
    Rate: 50
    Burst: 100
  Routes:
    "/api/order/create":
      Rate: 5
      Burst: 10
    "/api/user/login":
      Rate: 3
      Burst: 5
    "/api/user/register":
      Rate: 2
      Burst: 5

# CORS 配置
CORS:
  Enabled: true
  AllowedOrigins:
    - "*"
  AllowedMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  AllowedHeaders:
    - Content-Type
    - Authorization
    - X-Requested-With
  MaxAge: 3600

# 断路器配置
CircuitBreaker:
  Enabled: true
  Threshold: 50

# 网关的 Redis 配置 (用于存放黑名单)
RedisConf:
  Host: redis-cluster:6379
  Type: node
  Pass: ""
  DB: 0

# MySQL 配置
MysqlConf:
  Host: mysql:3306
  User: root
  Password: root
  Database: ecommerce_demo

# User RPC客户端配置
UserRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc
  Timeout: 3000

# Product RPC 客户端配置
ProductRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: product.rpc
  Timeout: 3000

# Order RPC 客户端配置
OrderRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: order.rpc
  Timeout: 5000

# Stock RPC 客户端配置
StockRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: stock.rpc
  Timeout: 3000

# Cart RPC 客户端配置
CartRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: cart.rpc
  Timeout: 3000

# Payment RPC 客户端配置
PaymentRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: payment.rpc
  Timeout: 5000

# Address RPC 客户端配置
AddressRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: address.rpc
  Timeout: 3000

# OpenTelemetry 链路追踪配置
Telemetry:
  Name: gateway
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
