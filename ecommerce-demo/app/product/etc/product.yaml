Name: product.rpc
ListenOn: 0.0.0.0:8081
Etcd:
  Hosts:
    - etcd:2379
  Key: product.rpc

# MySQL 配置
DataSource: root:root@tcp(mysql:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local

# Redis 配置 (高并发缓存)
RedisConf:
  Host: redis-cluster:6379
  Type: node
  Pass: "redis123456"
  DB: 0

# OpenTelemetry 链路追踪配置
Telemetry:
  Name: product.rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
