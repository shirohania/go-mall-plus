<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoMall Plus - 极致购物体验</title>
<style>
/* ============================================================
   GoMall Plus - 现代化电商前端
   ============================================================ */
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: #eef2ff;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f97316;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.04);
  --transition: 0.2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---- Navbar ---- */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 2rem;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.navbar-brand {
  font-size: 1.5rem; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  cursor: pointer; letter-spacing: -0.5px;
}
.navbar-actions { display: flex; align-items: center; gap: .75rem; }
.nav-btn {
  position: relative;
  display: flex; align-items: center; gap: .4rem;
  padding: .5rem .9rem; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--gray-600); font-size: .9rem;
  cursor: pointer; transition: var(--transition); font-weight: 500;
}
.nav-btn:hover { background: var(--gray-100); color: var(--gray-900); }
.nav-btn.active { background: var(--primary-light); color: var(--primary); }
.nav-btn .badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--danger); color: #fff; font-size: .65rem;
  min-width: 18px; height: 18px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; padding: 0 4px;
}
.nav-user {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem .8rem; border-radius: var(--radius-sm);
  background: var(--gray-100); font-size: .85rem; font-weight: 600;
  color: var(--gray-700); cursor: pointer; transition: var(--transition);
}
.nav-user:hover { background: var(--gray-200); }
.nav-user .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #a855f7);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700;
}

/* ---- Layout ---- */
.container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }
.page-title { font-size: 1.75rem; font-weight: 800; color: var(--gray-900); margin-bottom: 1.5rem; letter-spacing: -0.5px; }

/* ---- Category Pills ---- */
.category-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.category-pill {
  padding: .5rem 1rem; border-radius: 20px; border: 1.5px solid var(--gray-200);
  background: #fff; font-size: .85rem; cursor: pointer; font-weight: 500;
  transition: var(--transition); color: var(--gray-600); white-space: nowrap;
}
.category-pill:hover { border-color: var(--primary); color: var(--primary); }
.category-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ---- Search ---- */
.search-bar {
  display: flex; gap: .5rem; margin-bottom: 1.5rem;
}
.search-bar input {
  flex: 1; padding: .75rem 1rem; border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-200); font-size: .9rem; outline: none;
  transition: var(--transition); background: #fff;
}
.search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.search-bar button {
  padding: .75rem 1.5rem; border-radius: var(--radius-sm); border: none;
  background: var(--primary); color: #fff; font-weight: 600; cursor: pointer;
  transition: var(--transition); font-size: .9rem;
}
.search-bar button:hover { background: var(--primary-dark); }

/* ---- Product Grid ---- */
.product-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.25rem;
}
.product-card {
  background: #fff; border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition);
  border: 1px solid var(--gray-100);
}
.product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
.product-card .img-wrap {
  height: 200px; background: linear-gradient(135deg, #f0f0ff, #faf5ff);
  display: flex; align-items: center; justify-content: center; font-size: 4rem;
  position: relative; overflow: hidden;
}
.product-card .img-wrap .emoji { transition: var(--transition); }
.product-card:hover .img-wrap .emoji { transform: scale(1.1); }
.product-card .info { padding: 1rem 1.25rem; }
.product-card .name { font-size: .95rem; font-weight: 700; color: var(--gray-800); margin-bottom: .25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-card .desc { font-size: .8rem; color: var(--gray-400); margin-bottom: .75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-card .bottom { display: flex; align-items: center; justify-content: space-between; }
.product-card .price { font-size: 1.25rem; font-weight: 800; color: var(--danger); }
.product-card .price span { font-size: .75rem; font-weight: 500; }
.product-card .stock { font-size: .75rem; color: var(--gray-400); }
.product-card .stock.low { color: var(--warning); font-weight: 600; }
.product-card .btn-cart {
  padding: .5rem 1rem; border-radius: var(--radius-sm); border: none;
  background: var(--primary); color: #fff; font-size: .8rem; font-weight: 600;
  cursor: pointer; transition: var(--transition);
}
.product-card .btn-cart:hover { background: var(--primary-dark); }
.product-card .btn-cart:disabled { background: var(--gray-300); cursor: not-allowed; }

/* ---- Detail Modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff; border-radius: var(--radius-xl); width: 90%; max-width: 640px;
  max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-xl);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 2rem; border-bottom: 1px solid var(--gray-100);
}
.modal-header h2 { font-size: 1.25rem; font-weight: 700; }
.modal-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; font-size: 1.2rem; transition: var(--transition); }
.modal-close:hover { background: var(--gray-200); }
.modal-body { padding: 2rem; }
.modal-body .detail-img {
  width: 100%; height: 240px; background: linear-gradient(135deg,#f0f0ff,#faf5ff);
  border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  font-size: 6rem; margin-bottom: 1.5rem;
}
.detail-price { font-size: 2rem; font-weight: 800; color: var(--danger); }
.detail-price span { font-size: .9rem; color: var(--gray-400); font-weight: 500; }
.detail-meta { display: flex; gap: 1rem; margin: .75rem 0; font-size: .85rem; color: var(--gray-500); }
.detail-desc { color: var(--gray-600); margin: 1rem 0; line-height: 1.8; }
.detail-actions { display: flex; gap: .75rem; align-items: center; margin-top: 1.5rem; }
.qty-control { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); overflow: hidden; }
.qty-btn { width: 36px; height: 36px; border: none; background: var(--gray-50); cursor: pointer; font-size: 1.1rem; transition: var(--transition); }
.qty-btn:hover { background: var(--gray-100); }
.qty-val { width: 48px; text-align: center; font-weight: 700; font-size: .95rem; }
.btn-primary {
  padding: .75rem 2rem; border-radius: var(--radius-sm); border: none;
  background: var(--primary); color: #fff; font-weight: 600; font-size: .9rem;
  cursor: pointer; transition: var(--transition);
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; transform: none; }
.btn-outline {
  padding: .75rem 2rem; border-radius: var(--radius-sm); border: 1.5px solid var(--gray-200);
  background: #fff; font-weight: 600; cursor: pointer; transition: var(--transition); font-size: .9rem;
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* ---- Cart Drawer ---- */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
}
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; z-index: 301;
  width: 420px; max-width: 90vw; background: #fff; box-shadow: var(--shadow-xl);
  animation: slideRight .25s ease; display: flex; flex-direction: column;
}
@keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-100);
}
.drawer-body { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
.drawer-footer { padding: 1.25rem 1.5rem; border-top: 1px solid var(--gray-100); }
.cart-item {
  display: flex; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid var(--gray-50);
  align-items: center;
}
.cart-item .ci-img {
  width: 56px; height: 56px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg,#f0f0ff,#faf5ff);
  display: flex; align-items: center; justify-content: center; font-size: 1.75rem;
  flex-shrink: 0;
}
.cart-item .ci-info { flex: 1; min-width: 0; }
.cart-item .ci-name { font-weight: 600; font-size: .85rem; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item .ci-price { font-size: .8rem; color: var(--gray-500); }
.cart-item .ci-qty { display: flex; align-items: center; gap: .25rem; margin-top: .25rem; }
.cart-item .ci-qty button {
  width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--gray-200);
  background: #fff; cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.cart-item .ci-qty button:hover { background: var(--gray-50); }
.cart-item .ci-total { font-weight: 700; color: var(--danger); font-size: .9rem; white-space: nowrap; }
.cart-item .ci-remove {
  background: none; border: none; color: var(--gray-300); cursor: pointer;
  font-size: 1.1rem; padding: .25rem; transition: var(--transition);
}
.cart-item .ci-remove:hover { color: var(--danger); }

/* ---- Order Card ---- */
.order-card {
  background: #fff; border-radius: var(--radius); padding: 1.25rem 1.5rem;
  margin-bottom: .75rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100);
}
.order-card .oc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
.order-card .oc-no { font-weight: 700; color: var(--gray-900); font-size: .9rem; }
.order-card .oc-status { padding: .25rem .75rem; border-radius: 20px; font-size: .75rem; font-weight: 600; }
.order-card .oc-status.pending { background: #fef3c7; color: #92400e; }
.order-card .oc-status.paid { background: #d1fae5; color: #065f46; }
.order-card .oc-status.cancelled { background: var(--gray-100); color: var(--gray-500); }
.order-card .oc-body { display: flex; gap: 1rem; align-items: center; }
.order-card .oc-icon {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg,#f0f0ff,#faf5ff);
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
}
.order-card .oc-info { flex: 1; }
.order-card .oc-name { font-weight: 600; font-size: .9rem; }
.order-card .oc-meta { font-size: .8rem; color: var(--gray-400); margin-top: .15rem; }
.order-card .oc-amount { font-weight: 800; color: var(--danger); font-size: 1.1rem; }

/* ---- Auth Modal ---- */
.auth-modal { max-width: 420px; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--gray-200); }
.auth-tab {
  flex: 1; padding: .75rem; text-align: center; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--gray-400); transition: var(--transition);
}
.auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: .85rem; font-weight: 600; color: var(--gray-700); margin-bottom: .35rem; }
.form-group input {
  width: 100%; padding: .7rem .9rem; border-radius: var(--radius-sm); border: 1.5px solid var(--gray-200);
  font-size: .9rem; outline: none; transition: var(--transition);
}
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-error { color: var(--danger); font-size: .8rem; margin-top: .25rem; }
.btn-full { width: 100%; padding: .8rem; border-radius: var(--radius-sm); border: none; font-weight: 700; font-size: .95rem; cursor: pointer; transition: var(--transition); }

/* ---- Toast ---- */
.toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
.toast {
  padding: .9rem 1.25rem; border-radius: var(--radius-sm); color: #fff; font-weight: 600;
  font-size: .85rem; box-shadow: var(--shadow-lg); animation: slideIn .3s ease;
  display: flex; align-items: center; gap: .5rem; max-width: 380px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ---- Empty State ---- */
.empty-state {
  text-align: center; padding: 4rem 2rem; color: var(--gray-400);
}
.empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
.empty-state p { font-size: 1rem; font-weight: 600; }

/* ---- Loading ---- */
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--gray-200);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 3rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Skeleton ---- */
.skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
.skeleton-card { height: 340px; border-radius: var(--radius-lg); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 1rem; }
  .navbar { padding: 0 1rem; }
  .product-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }
  .drawer { width: 100%; max-width: 100%; }
  .modal { width: 95%; }
}
</style>
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar">
  <div class="navbar-brand" onclick="navigate('home')">GoMall Plus</div>
  <div class="navbar-actions">
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')">🏠 首页</button>
    <button class="nav-btn" id="nav-orders" onclick="navigate('orders')">📋 订单</button>
    <button class="nav-btn" id="nav-cart" onclick="openCart()">
      🛒 购物车
      <span class="badge" id="cart-badge" style="display:none">0</span>
    </button>
    <span id="nav-auth-area">
      <button class="nav-btn" onclick="openAuth()" id="btn-login">登录</button>
    </span>
  </div>
</nav>

<!-- ===== Main Content ===== -->
<div class="container" id="app"></div>

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toasts"></div>

<!-- ===== Hidden templates ===== -->
<div id="modal-root"></div>
<div id="drawer-root"></div>

<script>
// ============================================================
// GoMall Plus - 前端应用逻辑
// ============================================================
const API = 'http://localhost:30088';

// ---- State ----
const state = {
  token: localStorage.getItem('token') || null,
  refreshToken: localStorage.getItem('refreshToken') || null,
  userId: parseInt(localStorage.getItem('userId')) || null,
  username: localStorage.getItem('username') || '',
  cart: [],
  cartVersion: 0,
};

// ---- Helpers ----
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
const fmtPrice = (p) => '¥' + (p / 100).toFixed(2);
const fmtTime = (ts) => new Date(ts * 1000).toLocaleString('zh-CN');

const productEmojis = ['📱','💻','🎧','📷','💨','🎮','✨','🍶','📦'];
function getEmoji(id) { return productEmojis[(id - 1) % productEmojis.length]; }

// ---- API Client ----
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  // Check for token renewal in response
  const res = await fetch(API + path, { ...opts, headers });
  const renewed = res.headers.get('X-New-Access-Token');
  if (renewed) { state.token = renewed; localStorage.setItem('token', renewed); }
  const data = await res.json();
  if (data.code === 401) { logout(); throw new Error('请重新登录'); }
  if (data.code !== 0 && data.code !== undefined) throw new Error(data.msg || '请求失败');
  return data;
}

// ---- Toast ----
let toastId = 0;
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', warning: '⚠️' };
  el.innerHTML = `${icons[type] || ''} ${msg}`;
  el.id = 't-' + (++toastId);
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ---- Auth ----
function isLoggedIn() { return !!state.token; }
function logout() {
  if (state.token) api('/api/user/logout', { method: 'POST' }).catch(() => {});
  state.token = null; state.refreshToken = null; state.userId = null; state.username = '';
  state.cart = []; state.cartVersion++;
  ['token','refreshToken','userId','username'].forEach(k => localStorage.removeItem(k));
  updateNav(); navigate('home'); toast('已退出登录');
}

async function login(username, password) {
  const data = await api('/api/user/login', { method: 'POST', body: JSON.stringify({ username, password }) });
  state.token = data.data.accessToken;
  state.refreshToken = data.data.refreshToken;
  state.userId = data.data.id;
  state.username = username;
  localStorage.setItem('token', state.token);
  localStorage.setItem('refreshToken', state.refreshToken);
  localStorage.setItem('userId', state.userId);
  localStorage.setItem('username', username);
  updateNav(); toast('登录成功！');
  return data;
}

async function register(username, password) {
  await api('/api/user/register', { method: 'POST', body: JSON.stringify({ username, password }) });
  toast('注册成功，请登录', 'success');
  return true;
}

// ---- Navigation ----
function navigate(page, params) {
  $$('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { home: 'nav-home', orders: 'nav-orders' };
  if (map[page]) $('#' + map[page]).classList.add('active');
  closeModal(); closeDrawer();
  switch (page) {
    case 'home': renderHome(params); break;
    case 'orders': if (!isLoggedIn()) { openAuth(); return; } renderOrders(); break;
    default: renderHome();
  }
}

// ---- Update Nav ----
function updateNav() {
  if (isLoggedIn()) {
    $('#nav-auth-area').innerHTML = `
      <span class="nav-user" onclick="navigate('orders')">
        <span class="avatar">${(state.username||'U')[0].toUpperCase()}</span>
        ${state.username}
      </span>
      <button class="nav-btn" onclick="logout()" style="font-size:.8rem">退出</button>`;
  } else {
    $('#nav-auth-area').innerHTML = `<button class="nav-btn" onclick="openAuth()">登录</button>`;
  }
  updateCartBadge();
}

async function updateCartBadge() {
  if (!isLoggedIn()) { $('#cart-badge').style.display = 'none'; return; }
  try {
    const d = await api('/api/cart/list');
    state.cart = d.data?.items || [];
    state.cartVersion++;
    const count = state.cart.reduce((s, i) => s + i.count, 0);
    const badge = $('#cart-badge');
    if (count > 0) { badge.style.display = 'flex'; badge.textContent = count; }
    else { badge.style.display = 'none'; }
  } catch (e) { /* ignore */ }
}

// ---- Auth Modal ----
function openAuth(tab = 'login') {
  const html = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal auth-modal">
      <div class="auth-tabs">
        <div class="auth-tab ${tab==='login'?'active':''}" onclick="openAuth('login')">登录</div>
        <div class="auth-tab ${tab==='register'?'active':''}" onclick="openAuth('register')">注册</div>
      </div>
      <div class="modal-body">
        <form id="auth-form" onsubmit="handleAuth(event,'${tab}')">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="auth-username" required minlength="4" placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="auth-password" required minlength="6" placeholder="请输入密码">
          </div>
          <div id="auth-error" class="form-error"></div>
          <button type="submit" class="btn-primary btn-full" style="margin-top:.5rem">
            ${tab === 'login' ? '登录' : '注册'}
          </button>
        </form>
      </div>
    </div>
  </div>`;
  showModal(html);
}

async function handleAuth(e, tab) {
  e.preventDefault();
  const username = $('#auth-username').value.trim();
  const password = $('#auth-password').value.trim();
  const errEl = $('#auth-error');
  errEl.textContent = '';
  try {
    if (tab === 'login') {
      await login(username, password);
      closeModal(); navigate('home');
    } else {
      await register(username, password);
      openAuth('login');
    }
  } catch (err) { errEl.textContent = err.message; }
}

// ---- Modal ----
function showModal(html) { $('#modal-root').innerHTML = html; }
function closeModal() { $('#modal-root').innerHTML = ''; }

// ---- Drawer ----
function openCart() {
  if (!isLoggedIn()) { openAuth(); return; }
  renderCartDrawer();
}
function closeDrawer() { $('#drawer-root').innerHTML = ''; }

async function renderCartDrawer() {
  try {
    const d = await api('/api/cart/list');
    state.cart = d.data?.items || [];
    state.cartVersion++;
  } catch (e) { state.cart = []; }

  const items = state.cart;
  const total = items.reduce((s, i) => s + i.price * i.count, 0);

  let itemsHtml = items.length === 0
    ? `<div class="empty-state"><div class="icon">🛒</div><p>购物车是空的</p></div>`
    : items.map(i => `
    <div class="cart-item">
      <div class="ci-img">${getEmoji(i.product_id)}</div>
      <div class="ci-info">
        <div class="ci-name">${escHtml(i.product_name)}</div>
        <div class="ci-price">${fmtPrice(i.price)}</div>
        <div class="ci-qty">
          <button onclick="updateCartQty(${i.product_id}, ${i.count - 1})">−</button>
          <span style="min-width:24px;text-align:center;font-weight:600">${i.count}</span>
          <button onclick="updateCartQty(${i.product_id}, ${i.count + 1})">+</button>
        </div>
      </div>
      <div class="ci-total">${fmtPrice(i.price * i.count)}</div>
      <button class="ci-remove" onclick="removeCartItem(${i.product_id})">✕</button>
    </div>`).join('');

  $('#drawer-root').innerHTML = `
    <div class="drawer-overlay" onclick="if(event.target===this)closeDrawer()"></div>
    <div class="drawer">
      <div class="drawer-header">
        <h2>🛒 购物车 (${items.length}种)</h2>
        <button class="modal-close" onclick="closeDrawer()">✕</button>
      </div>
      <div class="drawer-body">${itemsHtml}</div>
      <div class="drawer-footer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <span style="font-weight:600;font-size:1.1rem">合计</span>
          <span style="font-size:1.5rem;font-weight:800;color:var(--danger)">${fmtPrice(total)}</span>
        </div>
        <button class="btn-primary btn-full" ${items.length===0?'disabled':''}
          onclick="checkout()">去结算</button>
      </div>
    </div>`;
}

async function updateCartQty(productId, count) {
  if (count <= 0) { await removeCartItem(productId); return; }
  try {
    await api('/api/cart/update', { method: 'PUT', body: JSON.stringify({ product_id: productId, count }) });
    renderCartDrawer(); updateCartBadge();
  } catch (e) { toast(e.message, 'error'); }
}

async function removeCartItem(productId) {
  try {
    await api('/api/cart/' + productId, { method: 'DELETE' });
    toast('已移除');
    renderCartDrawer(); updateCartBadge();
  } catch (e) { toast(e.message, 'error'); }
}

async function addToCart(productId, name, price, imageUrl) {
  if (!isLoggedIn()) { openAuth(); return; }
  try {
    await api('/api/cart/add', { method: 'POST', body: JSON.stringify({
      product_id: productId, product_name: name, price, image_url: imageUrl || '', count: 1
    })});
    toast('已加入购物车');
    updateCartBadge();
  } catch (e) { toast(e.message, 'error'); }
}

async function checkout() {
  closeDrawer();
  const items = state.cart;
  if (items.length === 0) return;
  let success = 0, fail = 0;
  for (const item of items) {
    try {
      await api('/api/order/create', { method: 'POST', body: JSON.stringify({
        userId: state.userId, productId: item.product_id, count: item.count
      })});
      success++;
    } catch (e) { fail++; }
  }
  if (success > 0) {
    // Clear cart
    await api('/api/cart/clear', { method: 'DELETE' }).catch(()=>{});
    state.cart = []; updateCartBadge();
    toast(`成功下单 ${success} 件商品！`, 'success');
  }
  if (fail > 0) toast(`${fail} 件商品下单失败`, 'error');
}

// ---- Render: Home / Product List ----
async function renderHome(params) {
  $('#app').innerHTML = `<div class="spinner"></div>`;

  let categories = [], products = [];
  try {
    const [catRes, prodRes] = await Promise.all([
      api('/api/product/categories').catch(() => ({ data: { categories: [] } })),
      api('/api/product/list').catch(() => ({ data: { products: [] } })),
    ]);
    categories = catRes.data?.categories || [];
    products = prodRes.data?.products || [];
  } catch (e) { products = []; }

  const catAll = { id: 0, name: '全部' };
  const allCats = [catAll, ...categories];

  $('#app').innerHTML = `
    <h1 class="page-title">精选好物</h1>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索商品名称或描述..." oninput="filterProducts()">
      <button onclick="filterProducts()">🔍 搜索</button>
    </div>
    <div class="category-bar" id="category-bar">
      ${allCats.map(c => `<span class="category-pill${c.id===0?' active':''}" data-cid="${c.id}" onclick="selectCategory(${c.id}, this)">${escHtml(c.name)}</span>`).join('')}
    </div>
    <div class="product-grid" id="product-grid">
      ${products.map(p => productCardHtml(p)).join('')}
    </div>
    ${products.length === 0 ? '<div class="empty-state"><div class="icon">📦</div><p>暂无商品</p></div>' : ''}
  `;

  window._allProducts = products;
  window._allCategories = categories;
}

function productCardHtml(p) {
  const lowStock = p.stock > 0 && p.stock < 10;
  return `
  <div class="product-card" onclick="openProductDetail(${p.id})">
    <div class="img-wrap"><span class="emoji">${getEmoji(p.id)}</span></div>
    <div class="info">
      <div class="name">${escHtml(p.name)}</div>
      <div class="desc">${escHtml(p.desc || '')}</div>
      <div class="bottom">
        <div>
          <div class="price">${fmtPrice(p.price)}<span></span></div>
          <div class="stock${lowStock?' low':''}">${p.stock > 0 ? '库存 '+p.stock : '已售罄'}</div>
        </div>
        <button class="btn-cart" ${p.stock<=0?'disabled':''}
          onclick="event.stopPropagation();addToCart(${p.id},'${escHtml(p.name).replace(/'/g,"\\'")}',${p.price},'${p.image_url||''}')">
          加入购物车
        </button>
      </div>
    </div>
  </div>`;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function selectCategory(cid, el) {
  $$('.category-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  window._currentCategory = cid;
  filterProducts();
}

function filterProducts() {
  const keyword = ($('#search-input')?.value || '').toLowerCase();
  const cid = window._currentCategory || 0;
  const filtered = (window._allProducts || []).filter(p => {
    if (cid > 0 && p.category_id !== cid) return false;
    if (keyword && !p.name.toLowerCase().includes(keyword) && !(p.desc||'').toLowerCase().includes(keyword)) return false;
    return true;
  });
  const grid = $('#product-grid');
  if (grid) {
    grid.innerHTML = filtered.map(p => productCardHtml(p)).join('')
      || '<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配的商品</p></div>';
  }
}

// ---- Render: Product Detail ----
async function openProductDetail(id) {
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-body"><div class="spinner"></div></div></div></div>`);
  try {
    const d = await api('/api/product/' + id);
    const p = d.data.product;
    const lowStock = p.stock > 0 && p.stock < 10;
    showModal(`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>${escHtml(p.name)}</h2>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="detail-img"><span style="font-size:6rem">${getEmoji(p.id)}</span></div>
          <div class="detail-price">${fmtPrice(p.price)}<span> / 件</span></div>
          <div class="detail-meta">
            <span>📦 库存: <b style="color:${lowStock?'var(--warning)':'var(--success)'}">${p.stock}</b></span>
            <span>📂 ${escHtml(p.category_name || '未分类')}</span>
          </div>
          <div class="detail-desc">${escHtml(p.desc || '暂无描述')}</div>
          <div class="detail-actions">
            <div class="qty-control">
              <button class="qty-btn" onclick="detailChangeQty(-1)">−</button>
              <span class="qty-val" id="detail-qty">1</span>
              <button class="qty-btn" onclick="detailChangeQty(1)">+</button>
            </div>
            <button class="btn-primary" id="detail-add-btn" ${p.stock<=0?'disabled':''}
              onclick="detailAddToCart(${p.id},'${escHtml(p.name).replace(/'/g,"\\'")}',${p.price},'${p.image_url||''}')">
              🛒 加入购物车
            </button>
          </div>
        </div>
      </div>
    </div>`);
    window._detailProduct = p;
  } catch (e) { toast(e.message, 'error'); closeModal(); }
}

function detailChangeQty(delta) {
  const el = $('#detail-qty');
  if (!el) return;
  let v = parseInt(el.textContent) + delta;
  const max = window._detailProduct?.stock || 99;
  if (v < 1) v = 1; if (v > max) v = max;
  el.textContent = v;
}

async function detailAddToCart(id, name, price, imageUrl) {
  const qty = parseInt($('#detail-qty')?.textContent || 1);
  if (!isLoggedIn()) { openAuth(); return; }
  try {
    for (let i = 0; i < qty; i++) {
      await api('/api/cart/add', { method: 'POST', body: JSON.stringify({
        product_id: id, product_name: name, price, image_url: imageUrl || '', count: 1
      })});
    }
    toast(`已添加 ${qty} 件到购物车`);
    closeModal();
    updateCartBadge();
  } catch (e) { toast(e.message, 'error'); }
}

// ---- Render: Orders ----
async function renderOrders() {
  $('#app').innerHTML = `<div class="spinner"></div>`;
  try {
    const d = await api('/api/order/list?page=1&page_size=50');
    const orders = d.data?.orders || [];
    const statusMap = { 0: 'pending', 1: 'paid', 2: 'cancelled', 3: 'cancelled' };
    const statusText = { 0: '待支付', 1: '已支付', 2: '已取消', 3: '已超时' };

    $('#app').innerHTML = `
      <h1 class="page-title">我的订单</h1>
      ${orders.length === 0
        ? '<div class="empty-state"><div class="icon">📋</div><p>暂无订单</p><button class="btn-primary" style="margin-top:1rem" onclick="navigate(\'home\')">去逛逛</button></div>'
        : orders.map(o => `
        <div class="order-card">
          <div class="oc-header">
            <span class="oc-no"># ${o.order_no}</span>
            <span class="oc-status ${statusMap[o.status] || 'cancelled'}">${statusText[o.status] || '未知'}</span>
          </div>
          <div class="oc-body">
            <div class="oc-icon">📦</div>
            <div class="oc-info">
              <div class="oc-name">${escHtml(o.product_name || '商品')} ×${o.count}</div>
              <div class="oc-meta">${fmtTime(o.create_time)}</div>
            </div>
            <div class="oc-amount">${fmtPrice(o.total_amount)}</div>
          </div>
        </div>`).join('')}
    `;
  } catch (e) { $('#app').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败: ${e.message}</p></div>`; }
}

// ---- Init ----
async function init() {
  updateNav();
  // Try to refresh token if we have one
  if (state.refreshToken && !state.token) {
    try {
      const d = await api('/api/user/refresh', { method: 'POST', body: JSON.stringify({ refreshToken: state.refreshToken }) });
      state.token = d.data.accessToken;
      state.refreshToken = d.data.refreshToken;
      localStorage.setItem('token', state.token);
      localStorage.setItem('refreshToken', state.refreshToken);
      updateNav();
    } catch (e) { /* token expired */ }
  }
  navigate('home');
}

init();
</script>
