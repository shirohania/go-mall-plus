# =============================================================================
# RabbitMQ 3-Node Mirror Queue Cluster
# 镜像队列: ha-mode=all, 所有队列同步到全部 3 节点
# 任意节点宕机 → 队列消息不丢
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-erlang-cookie
  namespace: ecommerce
type: Opaque
stringData:
  cookie: "gomall-shared-cookie"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-cluster-config
  namespace: ecommerce
data:
  rabbitmq.conf: |
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.k8s.service_name = rabbitmq-headless
    cluster_formation.node_cleanup.interval = 30
    cluster_formation.node_cleanup.only_log_warning = true
    cluster_partition_handling = autoheal
    vm_memory_high_watermark.absolute = 400MB
    disk_free_limit.absolute = 1GB
    default_user = guest
    default_pass = guest
    queue_master_locator = min-masters
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_peer_discovery_k8s].
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: ecommerce
spec:
  clusterIP: None
  selector: {app: rabbitmq}
  ports:
    - {name: epmd, port: 4369}
    - {name: amqp, port: 5672}
    - {name: dist, port: 25672}
    - {name: mgmt, port: 15672}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ecommerce
  labels: {app: rabbitmq}
spec:
  type: ClusterIP
  selector: {app: rabbitmq}
  ports:
    - {name: amqp, port: 5672, targetPort: 5672}
    - {name: mgmt, port: 15672, targetPort: 15672}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-mgmt
  namespace: ecommerce
spec:
  type: NodePort
  selector: {app: rabbitmq}
  ports:
    - {name: mgmt-ui, port: 15672, targetPort: 15672, nodePort: 31672}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rabbitmq
  namespace: ecommerce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rabbitmq-peer-discovery
  namespace: ecommerce
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rabbitmq-peer-discovery
  namespace: ecommerce
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rabbitmq-peer-discovery
subjects:
  - kind: ServiceAccount
    name: rabbitmq
    namespace: ecommerce
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: ecommerce
  labels: {app: rabbitmq}
spec:
  serviceName: rabbitmq-headless
  replicas: 2
  selector:
    matchLabels: {app: rabbitmq}
  template:
    metadata:
      labels: {app: rabbitmq}
    spec:
      serviceAccountName: rabbitmq
      terminationGracePeriodSeconds: 30
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          command:
            - bash
            - -c
            - |
              # 用 K8s 环境变量替换容器名
              export RABBITMQ_NODENAME="rabbit@${HOSTNAME}"
              echo "Starting RabbitMQ node: $RABBITMQ_NODENAME"
              exec docker-entrypoint.sh rabbitmq-server
          ports:
            - {containerPort: 5672, name: amqp}
            - {containerPort: 15672, name: mgmt}
            - {containerPort: 4369, name: epmd}
            - {containerPort: 25672, name: dist}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef: {fieldPath: metadata.name}
            - name: K8S_SERVICE_NAME
              value: "rabbitmq-headless"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef: {fieldPath: metadata.namespace}
            - name: RABBITMQ_ERLANG_COOKIE
              value: "gomall-shared-cookie"
            - name: RABBITMQ_DEFAULT_USER
              valueFrom: {secretKeyRef: {name: ecommerce-secrets, key: rabbitmq-user}}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: {secretKeyRef: {name: ecommerce-secrets, key: rabbitmq-password}}
          volumeMounts:
            - {name: config, mountPath: /etc/rabbitmq/rabbitmq.conf, subPath: rabbitmq.conf}
            - {name: config, mountPath: /etc/rabbitmq/enabled_plugins, subPath: enabled_plugins}
            - {name: data, mountPath: /var/lib/rabbitmq}
          resources: {requests: {cpu: 100m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap: {name: rabbitmq-cluster-config}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: 2Gi}}
---
# Job: 集群就绪后自动创建 HA 镜像策略
apiVersion: batch/v1
kind: Job
metadata:
  name: rabbitmq-ha-policy
  namespace: ecommerce
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-cluster
          image: busybox
          command: ["sh", "-c"]
          args:
            - |
              for i in $(seq 1 90); do
                for n in rabbitmq-0.rabbitmq-headless rabbitmq-1.rabbitmq-headless rabbitmq-2.rabbitmq-headless; do
                  if wget -qO- http://${n}.ecommerce.svc.cluster.local:15672/api/overview --user guest --password guest 2>/dev/null | grep -q "rabbit"; then
                    echo "Node $n is ready!"
                  fi
                done
                sleep 5
              done
      containers:
        - name: set-ha-policy
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - |
              for n in rabbitmq-0.rabbitmq-headless rabbitmq-1.rabbitmq-headless rabbitmq-2.rabbitmq-headless; do
                echo "Setting HA policy via $n..."
                curl -s -u guest:guest -X PUT \
                  "http://${n}.ecommerce.svc.cluster.local:15672/api/policies/%2f/ha-all" \
                  -H "Content-Type: application/json" \
                  -d '{"pattern":".*","definition":{"ha-mode":"all","ha-sync-mode":"automatic"},"priority":1,"apply-to":"all"}' 2>/dev/null && echo "  Policy set!" && exit 0
                sleep 3
              done
              echo "HA policy applied."
