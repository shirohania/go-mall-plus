# =============================================================================
# MySQL Master (Primary) - 读写节点
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-master-config
  namespace: ecommerce
data:
  master.cnf: |
    [mysqld]
    server-id=1
    log-bin=mysql-bin
    binlog_format=ROW
    binlog_row_image=FULL
    expire_logs_days=7
    max_binlog_size=256M
    sync_binlog=1
    innodb_flush_log_at_trx_commit=1
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    default-time-zone='+08:00'
    max_connections=1000
    default-authentication-plugin=mysql_native_password
    [client]
    default-character-set=utf8mb4
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-master
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: mysql-master
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-master-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-master
  namespace: ecommerce
  labels:
    app: mysql-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-master
  template:
    metadata:
      labels:
        app: mysql-master
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: ecommerce_demo
          volumeMounts:
            - name: config
              mountPath: /etc/mysql/conf.d/master.cnf
              subPath: master.cnf
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-uroot", "-proot123456"]
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-uroot", "-proot123456"]
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: mysql-master-config
        - name: data
          persistentVolumeClaim:
            claimName: mysql-master-pvc
