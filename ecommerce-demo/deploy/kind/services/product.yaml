# =============================================================================
# Product RPC Service Deployment (K8s native - no Etcd)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-config
  namespace: ecommerce
data:
  product.yaml: |
    Name: product.rpc
    ListenOn: 0.0.0.0:8081
    # K8s native service discovery - no Etcd needed
    DataSource: root:root123456@tcp(mysql-write:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local
    RedisConf:
      Host: redis-cluster:6379
      Type: node
      Pass: "redis123456"
      DB: 0
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: product
  ports:
    - name: grpc
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: ecommerce
  labels:
    app: product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
        - name: product
          image: ecommerce-product:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
              name: grpc
          volumeMounts:
            - name: product-config
              mountPath: /app/etc/product.yaml
              subPath: product.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: product-config
          configMap:
            name: product-config
