# =============================================================================
# Address RPC Service Deployment (K8s native - no Etcd)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: address-config
  namespace: ecommerce
data:
  address.yaml: |
    Name: address.rpc
    ListenOn: 0.0.0.0:8085
    # K8s native service discovery - no Etcd needed
    DataSource: root:root123456@tcp(mysql-write:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local
---
apiVersion: v1
kind: Service
metadata:
  name: address
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: address
  ports:
    - name: grpc
      port: 8085
      targetPort: 8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: address
  namespace: ecommerce
  labels:
    app: address
spec:
  replicas: 2
  selector:
    matchLabels:
      app: address
  template:
    metadata:
      labels:
        app: address
    spec:
      containers:
        - name: address
          image: ecommerce-address:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
              name: grpc
          volumeMounts:
            - name: address-config
              mountPath: /app/etc/address.yaml
              subPath: address.yaml
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: address-config
          configMap:
            name: address-config
