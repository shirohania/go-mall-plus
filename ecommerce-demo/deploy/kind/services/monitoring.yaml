---
# ServiceMonitor 用于让 Prometheus 自动发现 Gateway 服务
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-monitor
  namespace: monitoring
  labels:
    release: prometheus  # 必须与 Prometheus 的 serviceMonitorSelector 匹配
spec:
  selector:
    matchLabels:
      app: gateway
  namespaceSelector:
    matchNames:
      - ecommerce
  endpoints:
    - port: gateway
      path: /metrics
      interval: 15s
