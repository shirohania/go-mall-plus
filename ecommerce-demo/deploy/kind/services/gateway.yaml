# =============================================================================
# Gateway Deployment and Service (K8s native - no Etcd)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: ecommerce
data:
  gateway.yaml: |
    Name: gateway
    Host: 0.0.0.0
    Port: 8888
    Auth:
      PrivateKeyPath: "/etc/jwt/private.pem"
      PublicKeyPath: "/etc/jwt/public.pem"
      AccessExpire: 7200
      RefreshExpire: 604800
    RedisConf:
      Host: redis:6379
      Type: node
      Pass: "redis123456"
      DB: 0
    MysqlConf:
      Host: mysql:3306
      User: root
      Password: root123456
      Database: ecommerce_demo
    # Direct gRPC connections via K8s DNS (no Etcd needed)
    UserRpcConf:
      Endpoints:
        - user.ecommerce.svc.cluster.local:8080
    ProductRpcConf:
      Endpoints:
        - product.ecommerce.svc.cluster.local:8081
    OrderRpcConf:
      Endpoints:
        - order.ecommerce.svc.cluster.local:8082
    CartRpcConf:
      Endpoints:
        - cart.ecommerce.svc.cluster.local:8083
    PaymentRpcConf:
      Endpoints:
        - payment.ecommerce.svc.cluster.local:8084
    AddressRpcConf:
      Endpoints:
        - address.ecommerce.svc.cluster.local:8085
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      nodePort: 30088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ecommerce
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ecommerce-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
              name: http
          volumeMounts:
            - name: gateway-config
              mountPath: /app/etc/gateway.yaml
              subPath: gateway.yaml
            - name: jwt-secret
              mountPath: /etc/jwt
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-config
        - name: jwt-secret
          secret:
            secretName: jwt-secret
