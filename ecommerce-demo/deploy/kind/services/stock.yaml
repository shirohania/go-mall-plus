# =============================================================================
# Stock RPC Service Deployment (K8s native - no Etcd)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-config
  namespace: ecommerce
data:
  stock.yaml: |
    Name: stock.rpc
    ListenOn: 0.0.0.0:8086
    DataSource: root:root123456@tcp(mysql-write:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local
    RedisConf:
      Host: redis-cluster:6379
      Type: node
      Pass: "redis123456"
    Reconciliation:
      Enabled: true
      IntervalSeconds: 300
      AlertThresholdPct: 10
---
apiVersion: v1
kind: Service
metadata:
  name: stock
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: stock
  ports:
    - name: grpc
      port: 8086
      targetPort: 8086
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock
  namespace: ecommerce
  labels:
    app: stock
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock
  template:
    metadata:
      labels:
        app: stock
    spec:
      containers:
        - name: stock
          image: ecommerce-stock:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8086
              name: grpc
          volumeMounts:
            - name: stock-config
              mountPath: /app/etc/stock.yaml
              subPath: stock.yaml
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: stock-config
          configMap:
            name: stock-config
