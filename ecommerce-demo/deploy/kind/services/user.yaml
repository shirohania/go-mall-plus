# =============================================================================
# User RPC Service Deployment (K8s native - no Etcd)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
  namespace: ecommerce
data:
  user.yaml: |
    Name: user.rpc
    ListenOn: 0.0.0.0:8080
    # K8s native service discovery - no Etcd needed
    DataSource: root:root123456@tcp(mysql-write:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: ecommerce
  labels:
    app: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: ecommerce-user:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: grpc
          volumeMounts:
            - name: user-config
              mountPath: /app/etc/user.yaml
              subPath: user.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: user-config
          configMap:
            name: user-config
