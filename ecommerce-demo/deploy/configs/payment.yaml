Name: payment.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
    - etcd:2379
  Key: payment.rpc
DataSource: root:root123456@tcp(mysql:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local
RedisHost: redis-cluster:6379
RedisPass: redis123456
KafkaConf:
  Brokers:
    - kafka:9092
  Topic: payment_result
  Group: payment-consumer

# OpenTelemetry 链路追踪配置
Telemetry:
  Name: payment.rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
