Name: gateway
Host: 0.0.0.0
Port: 8888

Auth:
  PrivateKeyPath: "/app/cert/private.pem"
  PublicKeyPath: "/app/cert/public.pem"
  AccessExpire: 7200
  RefreshExpire: 604800

RateLimit:
  Enabled: true
  Global:
    Rate: 1000
    Burst: 2000
  PerIP:
    Rate: 50
    Burst: 100
  Routes:
    "/api/order/create":
      Rate: 5
      Burst: 10
    "/api/user/login":
      Rate: 3
      Burst: 5
    "/api/user/register":
      Rate: 2
      Burst: 5

CORS:
  Enabled: true
  AllowedOrigins:
    - "*"
  AllowedMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  AllowedHeaders:
    - Content-Type
    - Authorization
    - X-Requested-With
  MaxAge: 3600

CircuitBreaker:
  Enabled: true
  Threshold: 50

RedisConf:
  Host: redis-cluster
  Type: node
  Pass: redis123456
  DB: 0

MysqlConf:
  Host: mysql
  User: root
  Password: root123
  Database: ecommerce_demo

UserRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc
  Timeout: 3000

ProductRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: product.rpc
  Timeout: 3000

OrderRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: order.rpc
  Timeout: 5000

StockRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: stock.rpc
  Timeout: 3000

CartRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: cart.rpc
  Timeout: 3000

PaymentRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: payment.rpc
  Timeout: 5000

AddressRpcConf:
  Etcd:
    Hosts:
      - etcd:2379
    Key: address.rpc
  Timeout: 3000

# OpenTelemetry 链路追踪配置
Telemetry:
  Name: gateway
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
