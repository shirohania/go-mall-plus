Name: user.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
    - etcd:2379
  Key: user.rpc
DataSource: root:root123456@tcp(mysql:3306)/ecommerce_demo?charset=utf8mb4&parseTime=True&loc=Local

# OpenTelemetry 链路追踪配置
Telemetry:
  Name: user.rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
